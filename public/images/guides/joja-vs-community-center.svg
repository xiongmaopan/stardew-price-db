<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Joja vs Community Center route comparison</title>
  <desc id="desc">Original StardewPriceDB infographic comparing Joja and Community Center routes in Stardew Valley.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f3ff"/>
      <stop offset="0.52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f8ef"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <text x="60" y="82" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="900">Joja vs Community Center</text>
  <text x="60" y="123" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Route choice for Stardew Valley 1.6.15</text>
  <rect x="60" y="160" width="520" height="345" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="620" y="160" width="520" height="345" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="88" y="188" width="160" height="38" rx="19" fill="#dcfce7"/>
  <text x="108" y="214" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900">BEST FIRST SAVE</text>
  <text x="88" y="276" fill="#14532d" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Community Center</text>
  <text x="88" y="328" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Pay with items, seasons, and planning</text>
  <text x="88" y="374" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Learns crops, fish, forage, mining, animals</text>
  <text x="88" y="410" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">More story payoff and bundle rewards</text>
  <text x="88" y="446" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Risk: one missed seasonal item can delay progress</text>
  <circle cx="508" cy="248" r="44" fill="#bbf7d0"/>
  <text x="486" y="264" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="900">✓</text>
  <rect x="648" y="188" width="136" height="38" rx="19" fill="#dbeafe"/>
  <text x="669" y="214" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900">BEST SPEED</text>
  <text x="648" y="276" fill="#1e3a8a" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Joja Route</text>
  <text x="648" y="328" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Pay 5,000g membership + 135,000g repairs</text>
  <text x="648" y="374" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Faster if your farm already prints gold</text>
  <text x="648" y="410" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Greenhouse can be bought directly for 35,000g</text>
  <text x="648" y="446" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Risk: less story, no bundle learning curve</text>
  <circle cx="1068" cy="248" r="44" fill="#bfdbfe"/>
  <text x="1041" y="265" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900">g</text>
  <rect x="180" y="535" width="840" height="54" rx="27" fill="#0f172a"/>
  <text x="228" y="570" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">StardewPriceDB take: first save = Community Center, repeat speed save = Joja</text>
  <text x="60" y="604" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="16">Original StardewPriceDB infographic - do not copy source screenshots</text>
</svg>
