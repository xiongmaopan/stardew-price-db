<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Joja vs Community Center route comparison</title>
  <desc id="desc">Original StardewPriceDB infographic comparing the Joja and Community Center routes in Stardew Valley.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eefaf3"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="32" fill="url(#bg)"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="64" y="76" fill="#0f172a" font-size="42" font-weight="900">Joja vs Community Center</text>
    <text x="64" y="114" fill="#475569" font-size="21" font-weight="700">A route-choice guide for Stardew Valley 1.6.15</text>

    <rect x="64" y="154" width="510" height="370" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="626" y="154" width="510" height="370" rx="24" fill="#ffffff" filter="url(#shadow)"/>

    <rect x="96" y="188" width="186" height="36" rx="18" fill="#dcfce7"/>
    <text x="118" y="212" fill="#166534" font-size="17" font-weight="900">BEST FIRST SAVE</text>
    <circle cx="492" cy="234" r="46" fill="#bbf7d0"/>
    <text x="469" y="250" fill="#166534" font-size="38" font-weight="900">CC</text>
    <text x="96" y="278" fill="#14532d" font-size="34" font-weight="900">Community Center</text>
    <text x="96" y="326" fill="#334155" font-size="22" font-weight="800">Pay with items and planning</text>
    <text x="96" y="369" fill="#475569" font-size="20">- Teaches crops, fish, forage, mining, animals</text>
    <text x="96" y="403" fill="#475569" font-size="20">- Better story payoff and bundle rewards</text>
    <text x="96" y="437" fill="#475569" font-size="20">- Slower if you miss a seasonal item</text>
    <text x="96" y="478" fill="#166534" font-size="18" font-weight="900">Choose this when you are still learning the valley.</text>

    <rect x="658" y="188" width="136" height="36" rx="18" fill="#dbeafe"/>
    <text x="680" y="212" fill="#1d4ed8" font-size="17" font-weight="900">BEST SPEED</text>
    <circle cx="1054" cy="234" r="46" fill="#bfdbfe"/>
    <text x="1035" y="251" fill="#1d4ed8" font-size="40" font-weight="900">G</text>
    <text x="658" y="278" fill="#1e3a8a" font-size="34" font-weight="900">Joja Route</text>
    <text x="658" y="326" fill="#334155" font-size="22" font-weight="800">Pay membership plus repairs</text>
    <text x="658" y="369" fill="#475569" font-size="20">- 5,000g membership, then 135,000g repairs</text>
    <text x="658" y="403" fill="#475569" font-size="20">- Greenhouse can be bought for 35,000g</text>
    <text x="658" y="437" fill="#475569" font-size="20">- Faster, but with less story and no bundles</text>
    <text x="658" y="478" fill="#1d4ed8" font-size="18" font-weight="900">Choose this after your farm has stable income.</text>

    <rect x="164" y="560" width="872" height="62" rx="31" fill="#0f172a"/>
    <text x="228" y="585" fill="#ffffff" font-size="20" font-weight="900">StardewPriceDB take</text>
    <text x="228" y="610" fill="#dbeafe" font-size="18" font-weight="700">First serious save: Community Center. Repeat speed save: Joja.</text>
  </g>
</svg>
