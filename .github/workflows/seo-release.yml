name: SEO release queue

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * 3"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Publish due SEO page
        run: npm run seo:release:due

      - name: Detect queue changes
        id: changes
        run: |
          if git diff --quiet -- data/seo-release-queue.json data/seo-release-log.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Verify data
        if: steps.changes.outputs.changed == 'true'
        run: npm run verify

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        run: npx wrangler pages deploy out --project-name=stardewpricedb --branch=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit release state
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seo-release-queue.json data/seo-release-log.json
          git commit -m "chore: publish queued SEO page"
          git push
